      .surface-card {

        border: 1px solid rgb(168 85 247 / 0.26);
        box-shadow: 0 10px 30px -18px rgb(34 211 238 / 0.45), 0 8px 26px -18px rgb(168 85 247 / 0.5);

        align-items: center;
        gap: 0.75rem;
        padding: 0.375rem;
        padding-right: 1rem;
        width: 100%;
        border-radius: 9999px;
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;

      .social-link:hover {

        border-color: rgb(34 211 238 / 0.6);

      .gallery-card {
        aspect-ratio: 1 / 1;
        border-radius: 0.75rem;
        overflow: hidden;
        position: relative;
        cursor: pointer;
        border: 1px solid rgb(168 85 247 / 0.25);
        background: rgb(12 13 20 / 0.82);

      .gallery-card:hover {
        transform: translateY(-4px) scale(1.01);
        border-color: rgb(34 211 238 / 0.55);

    <script>
      // Theme setup: defaults to dark mode for brand consistency, then uses saved preference.
      const root = document.documentElement;
      const themeToggle = document.getElementById("theme-toggle");
      const themeLabel = document.getElementById("theme-label");
      const themeIcon = document.getElementById("theme-icon");


      function applyTheme(theme) {
        const darkEnabled = theme === "dark";
        root.classList.toggle("dark", darkEnabled);
        themeLabel.textContent = darkEnabled ? "Light mode" : "Dark mode";
        themeIcon.textContent = darkEnabled ? "light_mode" : "dark_mode";
      }

      const savedTheme = localStorage.getItem("theme");
      applyTheme(savedTheme || "dark");

      themeToggle.addEventListener("click", () => {
        const nextTheme = root.classList.contains("dark") ? "light" : "dark";
        localStorage.setItem("theme", nextTheme);
        applyTheme(nextTheme);
      });
    </script>
